<h1 style="text-align:center;">All Locations</h1>

<div id="list"></div>

<script src="data.js"></script>

<script>
// ORGANIZATION LIST (MAIN CARDS)
document.getElementById("list").innerHTML =
  orgData.map(o => `
    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">

   <div>
  <h3>${o.name}</h3>

  <a href="org.html?id=${o.id}"
     style="color:#4da6ff; text-decoration:none;">
    ${o.city}, ${o.country}
  </a>
</div>

      <button onclick="window.location.href='${o.stripe}'"
      Donate Now
    </button>

    </div>
  `).join("");
</script>
